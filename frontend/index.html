<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuoteBot — Powered by Rasa NLU</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & BASE ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22253a;
      --border:    rgba(255,255,255,0.08);
      --accent:    #7C6AF7;
      --accent2:   #F7C06A;
      --text:      #E4E6F0;
      --muted:     #6B7080;
      --green:     #4CAF7D;
      --bot-bg:    #1e2130;
      --user-bg:   #2a2060;
      --radius:    16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 20px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── CATEGORY BAR ────────────────────────────────── */
    .cat-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      background: rgba(26,29,39,0.8);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .cat-bar::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex-shrink: 0;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }

    .cat-btn:hover { color: var(--text); border-color: var(--accent); }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── CHAT ────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* ── MESSAGES ────────────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 680px;
      animation: slideUp 0.3s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-row.bot { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bot .avatar {
      background: linear-gradient(135deg, #7C6AF7, #a78bfa);
    }

    .user .avatar {
      background: linear-gradient(135deg, #3b2fa0, #5c4fcf);
    }

    .bubble {
      padding: 13px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      max-width: 520px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(124,106,247,0.2);
      border-top-right-radius: 4px;
      color: #ccc8ff;
    }

    /* Quote formatting inside bot bubbles */
    .bubble em { font-family: 'Playfair Display', serif; font-style: italic; font-size: 15px; color: var(--text); }
    .bubble strong { color: var(--accent2); font-weight: 600; }

    /* ── TYPING INDICATOR ────────────────────────────── */
    .typing {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-top-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: typeDot 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typeDot {
      0%,100% { transform: translateY(0); opacity: 0.3; }
      50% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── QUICK REPLIES ───────────────────────────────── */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .qr-btn {
      padding: 6px 13px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      background: transparent;
      border: 1px solid rgba(124,106,247,0.3);
      color: #a78bfa;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .qr-btn:hover {
      background: rgba(124,106,247,0.12);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── WELCOME SCREEN ──────────────────────────────── */
    #welcomeScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px 24px;
      text-align: center;
      animation: slideUp 0.5s ease both;
    }

    .welcome-emoji { font-size: 52px; }

    .welcome-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
    }

    .welcome-title span { color: var(--accent); }

    .welcome-desc {
      font-size: 13px;
      color: var(--muted);
      max-width: 360px;
      line-height: 1.7;
    }

    .welcome-prompts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      max-width: 440px;
      margin-top: 6px;
    }

    .wp-btn {
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wp-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(124,106,247,0.06);
    }

    .wp-btn .wpe { font-size: 18px; flex-shrink: 0; }

    /* ── INPUT BAR ───────────────────────────────────── */
    .input-wrap {
      padding: 14px 20px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msgInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      resize: none;
      min-height: 46px;
      max-height: 110px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.5;
    }

    #msgInput::placeholder { color: var(--muted); }

    #msgInput:focus {
      border-color: rgba(124,106,247,0.5);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.08);
    }

    #sendBtn {
      width: 46px; height: 46px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #sendBtn:hover { background: #9380fa; transform: scale(1.05); }
    #sendBtn:active { transform: scale(0.97); }
    #sendBtn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

    .input-hint {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      margin-top: 7px;
      letter-spacing: 0.05em;
    }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 480px) {
      .welcome-prompts { grid-template-columns: 1fr; }
      .bubble { font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">💬</div>
    <div>
      <div class="logo-title">QuoteBot</div>
      <div class="logo-sub">Powered by Rasa NLU</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-badge" id="statusBadge">
      <span class="dot"></span>
      <span id="statusText">Connecting…</span>
    </div>
  </div>
</header>

<!-- CATEGORY BAR -->
<div class="cat-bar">
  <button class="cat-btn active" onclick="sendQuick('Surprise me with a random quote', this)">🎲 Random</button>
  <button class="cat-btn" onclick="sendQuick('Give me an inspiring quote', this)">✨ Inspiration</button>
  <button class="cat-btn" onclick="sendQuick('Give me a motivational quote', this)">⚡ Motivation</button>
  <button class="cat-btn" onclick="sendQuick('Give me a success quote', this)">🏆 Success</button>
  <button class="cat-btn" onclick="sendQuick('Give me a love quote', this)">💛 Love</button>
  <button class="cat-btn" onclick="sendQuick('Give me a funny quote', this)">😄 Humor</button>
</div>

<!-- CHAT -->
<div id="chat">
  <div id="welcomeScreen">
    <div class="welcome-emoji">💬</div>
    <h1 class="welcome-title">Hello! I'm <span>QuoteBot</span></h1>
    <p class="welcome-desc">Your personal quote companion. Tell me how you're feeling or what kind of wisdom you're looking for.</p>
    <div class="welcome-prompts">
      <button class="wp-btn" onclick="sendQuick('Inspire me')">
        <span class="wpe">✨</span><span>Inspire me</span>
      </button>
      <button class="wp-btn" onclick="sendQuick('I need motivation')">
        <span class="wpe">⚡</span><span>I need motivation</span>
      </button>
      <button class="wp-btn" onclick="sendQuick('Something funny please')">
        <span class="wpe">😄</span><span>Something funny</span>
      </button>
      <button class="wp-btn" onclick="sendQuick('Share a love quote')">
        <span class="wpe">💛</span><span>A love quote</span>
      </button>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-wrap">
  <div class="input-row">
    <textarea id="msgInput" placeholder="Ask for a quote or tell me how you're feeling…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  CONFIG — change RASA_URL to match your server
// ══════════════════════════════════════════════════════════
const RASA_URL = "http://localhost:5005/webhooks/rest/webhook";
const SENDER_ID = "user_" + Math.random().toString(36).substr(2, 9);

// ══════════════════════════════════════════════════════════
//  DOM REFS
// ══════════════════════════════════════════════════════════
const chat        = document.getElementById("chat");
const welcome     = document.getElementById("welcomeScreen");
const input       = document.getElementById("msgInput");
const sendBtn     = document.getElementById("sendBtn");
const statusText  = document.getElementById("statusText");

let chatStarted = false;
let isWaiting   = false;

// ══════════════════════════════════════════════════════════
//  STATUS CHECK
// ══════════════════════════════════════════════════════════
async function checkStatus() {
  try {
    const r = await fetch("http://localhost:5005/", { method: "GET", signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      statusText.textContent = "Online";
      document.querySelector(".dot").style.background = "#4CAF7D";
    } else { throw new Error(); }
  } catch {
    statusText.textContent = "Demo Mode";
    document.querySelector(".dot").style.background = "#F7C06A";
  }
}
checkStatus();

// ══════════════════════════════════════════════════════════
//  RENDER HELPERS
// ══════════════════════════════════════════════════════════
function hideWelcome() {
  if (!chatStarted) {
    chatStarted = true;
    welcome.style.display = "none";
  }
}

function parseMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/_(.*?)_/g, "<em>$1</em>")
    .replace(/\*(.*?)\*/g, "<em>$1</em>")
    .replace(/\n/g, "<br>");
}

function addMessage(role, html, quickReplies = []) {
  hideWelcome();
  const row = document.createElement("div");
  row.className = `msg-row ${role}`;

  const av = document.createElement("div");
  av.className = "avatar";
  av.textContent = role === "bot" ? "🤖" : "👤";

  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = html;

  if (quickReplies.length > 0) {
    const qr = document.createElement("div");
    qr.className = "quick-replies";
    quickReplies.forEach(label => {
      const btn = document.createElement("button");
      btn.className = "qr-btn";
      btn.textContent = label;
      btn.onclick = () => sendQuick(label);
      qr.appendChild(btn);
    });
    bub.appendChild(qr);
  }

  row.appendChild(av);
  row.appendChild(bub);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  hideWelcome();
  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.id = "typingRow";

  const av = document.createElement("div");
  av.className = "avatar";
  av.textContent = "🤖";

  const t = document.createElement("div");
  t.className = "typing";
  t.innerHTML = "<span></span><span></span><span></span>";

  row.appendChild(av);
  row.appendChild(t);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typingRow");
  if (el) el.remove();
}

// ══════════════════════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════════════════════
async function sendMessage() {
  const text = input.value.trim();
  if (!text || isWaiting) return;

  input.value = "";
  autoResize(input);
  isWaiting = true;
  sendBtn.disabled = true;

  addMessage("user", parseMarkdown(text));
  showTyping();

  try {
    const res = await fetch(RASA_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sender: SENDER_ID, message: text }),
    });

    removeTyping();

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();

    if (!data || data.length === 0) {
      addMessage("bot", "I didn't quite get that 😊 Try: <em>\"inspire me\"</em>, <em>\"motivate me\"</em>, or <em>\"funny quote\"</em>!", [
        "Inspire me", "Motivate me", "Funny quote"
      ]);
    } else {
      data.forEach(msg => {
        if (msg.text) {
          const qrs = getQuickReplies(msg.text);
          addMessage("bot", parseMarkdown(msg.text), qrs);
        }
      });
    }

  } catch (err) {
    removeTyping();
    // Fallback demo mode if Rasa is not running
    const demoReply = getDemoResponse(text);
    addMessage("bot", demoReply.text, demoReply.qr);
  }

  isWaiting = false;
  sendBtn.disabled = false;
  input.focus();
}

function sendQuick(text, catBtn = null) {
  if (catBtn) {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    catBtn.classList.add("active");
  }
  input.value = text;
  sendMessage();
}

// ══════════════════════════════════════════════════════════
//  QUICK REPLY SUGGESTIONS
// ══════════════════════════════════════════════════════════
function getQuickReplies(text) {
  if (text.includes("Hello") || text.includes("Hello!") || text.includes("👋")) {
    return ["Inspire me ✨", "Motivate me ⚡", "Funny quote 😄", "Love quote 💛"];
  }
  if (text.includes("Quote") || text.includes("quote")) {
    return ["Give me another 🔄", "Try a different category", "Thank you! 👋"];
  }
  return [];
}

// ══════════════════════════════════════════════════════════
//  DEMO MODE (when Rasa server is not running)
// ══════════════════════════════════════════════════════════
const demoQuotes = {
  inspir: { q: "The only way to do great work is to love what you do.", a: "Steve Jobs", cat: "✨ Inspiration" },
  motiv:  { q: "Believe you can and you're halfway there.", a: "Theodore Roosevelt", cat: "⚡ Motivation" },
  success:{ q: "Success usually comes to those who are too busy to be looking for it.", a: "Henry David Thoreau", cat: "🏆 Success" },
  love:   { q: "The best thing to hold onto in life is each other.", a: "Audrey Hepburn", cat: "💛 Love" },
  humor:  { q: "I'm writing a book. I've got the page numbers done.", a: "Steven Wright", cat: "😄 Humor" },
};

function getDemoResponse(text) {
  const t = text.toLowerCase();
  let entry = null;

  if (/inspir|uplift|hope|wisdom|encourage/.test(t))  entry = demoQuotes.inspir;
  else if (/motiv|push|drive|energy|keep going/.test(t)) entry = demoQuotes.motiv;
  else if (/success|achieve|goal|win|hustle/.test(t))  entry = demoQuotes.success;
  else if (/love|heart|romance|sweet|caring/.test(t))  entry = demoQuotes.love;
  else if (/funny|laugh|humor|smile|joke/.test(t))     entry = demoQuotes.humor;
  else if (/hi|hello|hey|greet/.test(t)) {
    return {
      text: "👋 Hello! I'm <strong>QuoteBot</strong>, your quote companion!\n\nI can share quotes in these categories:\n✨ Inspiration · ⚡ Motivation · 🏆 Success · 💛 Love · 😄 Humor\n\nWhat kind of quote are you looking for?",
      qr: ["Inspire me ✨", "Motivate me ⚡", "Funny quote 😄"]
    };
  } else if (/bye|goodbye|thanks/.test(t)) {
    return { text: "Goodbye! 🌟 May the words you carry today light your path forward!", qr: [] };
  } else {
    // random
    const keys = Object.keys(demoQuotes);
    entry = demoQuotes[keys[Math.floor(Math.random() * keys.length)]];
  }

  return {
    text: `${entry.cat} Quote\n\n_${entry.q}_\n\n— **${entry.a}**`,
    qr: ["Give me another 🔄", "Try a different category", "Thank you! 👋"]
  };
}

// ══════════════════════════════════════════════════════════
//  INPUT UTILS
// ══════════════════════════════════════════════════════════
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 110) + "px";
}

// Focus input on load
window.addEventListener("load", () => input.focus());
</script>
</body>
</html>
