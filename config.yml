# Rasa NLU Pipeline and Policy Configuration
# Quotes Recommendation Chatbot

recipe: default.v1

language: en

pipeline:
  # Tokenizer: splits text into tokens
  - name: WhitespaceTokenizer

  # Featurizers: extract features from tokens
  - name: RegexFeaturizer
  - name: LexicalSyntacticFeaturizer
  - name: CountVectorsFeaturizer
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4

  # DIET Classifier: Intent classification + Entity extraction
  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true
    model_confidence: softmax

  # Entity synonym mapper
  - name: EntitySynonymMapper

  # Response selector for FAQ
  - name: ResponseSelector
    epochs: 100
    constrain_similarities: true

  # Fallback classifier for low-confidence predictions
  - name: FallbackClassifier
    threshold: 0.70
    ambiguity_threshold: 0.10

policies:
  # Memorizes exact training stories
  - name: MemoizationPolicy

  # Rule-based policy for rules.yml
  - name: RulePolicy
    core_fallback_threshold: 0.40
    core_fallback_action_name: "action_default_fallback"
    enable_fallback_prediction: true

  # Transformer-based dialogue management
  - name: TEDPolicy
    max_history: 5
    epochs: 100
    constrain_similarities: true
