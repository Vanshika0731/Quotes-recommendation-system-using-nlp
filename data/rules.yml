version: "3.1"

rules:

- rule: Say goodbye anytime the user says goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Say hello anytime the user greets
  steps:
    - intent: greet
    - action: utter_greet

- rule: Help anytime user asks for help
  steps:
    - intent: ask_help
    - action: utter_help

- rule: Handle fallback
  steps:
    - intent: nlu_fallback
    - action: utter_fallback

- rule: Affirm means want another quote
  steps:
    - intent: affirm
    - action: action_another_quote
    - action: utter_ask_more

- rule: Deny means no more quotes
  steps:
    - intent: deny
    - action: utter_goodbye
